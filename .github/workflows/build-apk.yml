name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android-apk:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies (includes @capacitor/android)
        working-directory: "Job Portal/frontend"
        run: npm install

      - name: Write Android SDK path to local.properties
        working-directory: "Job Portal/android"
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Remove any user-level gradle.properties that may override java.home
        run: |
          rm -f ~/.gradle/gradle.properties
          echo "Cleared user gradle.properties"

      - name: Verify Java version
        run: java -version

      - name: Grant execute permission to Gradlew
        working-directory: "Job Portal/android"
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: "Job Portal/android"
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
        run: ./gradlew assembleDebug --no-daemon --stacktrace -Dorg.gradle.java.home=$JAVA_HOME

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: JobPortal-debug-apk
          path: "Job Portal/android/app/build/outputs/apk/debug/app-debug.apk"
          retention-days: 30
