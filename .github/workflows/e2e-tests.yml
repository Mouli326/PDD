name: Scale E2E suites to 1800 test cases

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  selenium-web-tests:
    name: Selenium — Website Tests (300)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies & Run Selenium Web Suite
        run: |
          cd "Job Portal/e2e_framework"
          npm install
          node 01_selenium_web_tests.js

      - name: Upload Selenium Web Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: selenium-web-report
          path: "Job Portal/e2e_framework/reports/selenium-web-report.xlsx"

  appium-android-tests:
    name: Appium — Android Tests (300)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies & Run Appium Android Suite
        run: |
          cd "Job Portal/e2e_framework"
          npm install
          node 02_appium_android_tests.js

      - name: Upload Appium Android Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: appium-android-report
          path: "Job Portal/e2e_framework/reports/appium-android-report.xlsx"

  unit-tests-api:
    name: Unit Tests — API (300)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies & Run API Unit Suite
        run: |
          cd "Job Portal/e2e_framework"
          npm install
          node 03_unit_api_tests.js

      - name: Upload Unit Test Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: "Job Portal/e2e_framework/reports/unit-test-report.xlsx"

  validation-tests:
    name: Validation Tests (300)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies & Run Validation Suite
        run: |
          cd "Job Portal/e2e_framework"
          npm install
          node 04_validation_tests.js

      - name: Upload Validation Test Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: validation-test-report
          path: "Job Portal/e2e_framework/reports/validation-test-report.xlsx"

  deployment-status:
    name: Deployment Status (300)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies & Run Deployment Status Suite
        run: |
          cd "Job Portal/e2e_framework"
          npm install
          node 05_deployment_tests.js

      - name: Upload Deployment Test Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-test-report
          path: "Job Portal/e2e_framework/reports/deployment-test-report.xlsx"

  load-testing-performance:
    name: Load Testing — Performance (300)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies & Run Load Performance Suite
        run: |
          cd "Job Portal/e2e_framework"
          npm install
          node 06_load_performance_tests.js

      - name: Upload Load Test Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: load-test-report
          path: "Job Portal/e2e_framework/reports/load-test-report.xlsx"

  compile-master-report:
    name: Compile Master Report & Deploy
    needs: [selenium-web-tests, appium-android-tests, unit-tests-api, validation-tests, deployment-status, load-testing-performance]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Dependencies & Compile Master Report
        run: |
          cd "Job Portal/e2e_framework"
          npm install
          node 07_master_report_compiler.js

      - name: Upload Master E2E Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: full-e2e-report
          path: "Job Portal/e2e_framework/reports/full-e2e-report.xlsx"
